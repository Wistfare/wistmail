name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/wistfare/wistmail

permissions:
  contents: read
  packages: write

jobs:
  # ── Detect which services changed ──────────────────────────────────────────
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      docs: ${{ steps.filter.outputs.docs }}
      engine: ${{ steps.filter.outputs.engine }}
      ai_worker: ${{ steps.filter.outputs.ai_worker }}
      deploy: ${{ steps.filter.outputs.deploy }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/shared/**'
              - 'packages/db/**'
              - 'packages/dns-manager/**'
              # The api imports queue constants + AI types from @wistmail/ai.
              # When that package changes, the api binary must be rebuilt or
              # it will keep enqueuing to a stale queue name.
              - 'packages/ai/**'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
              - 'tsconfig.json'
            web:
              - 'apps/web/**'
              - 'packages/shared/**'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
              - 'tsconfig.json'
            docs:
              - 'apps/docs/**'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
            engine:
              - 'packages/mail-engine/**'
            ai_worker:
              - 'apps/ai-worker/**'
              - 'packages/ai/**'
              - 'packages/db/**'
              - 'packages/shared/**'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
              - 'tsconfig.json'
            deploy:
              - 'docker-compose.yml'
              - 'Caddyfile'

  # ── Build API image ────────────────────────────────────────────────────────
  build-api:
    name: Build API
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-api:latest
            ${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  # ── Build Web image ────────────────────────────────────────────────────────
  build-web:
    name: Build Web
    needs: detect-changes
    if: needs.detect-changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-web:latest
            ${{ env.IMAGE_PREFIX }}-web:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://mail.wistfare.com
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  # ── Build Docs image ───────────────────────────────────────────────────────
  build-docs:
    name: Build Docs
    needs: detect-changes
    if: needs.detect-changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/docs/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-docs:latest
            ${{ env.IMAGE_PREFIX }}-docs:${{ github.sha }}
          cache-from: type=gha,scope=docs
          cache-to: type=gha,mode=max,scope=docs

  # ── Build Mail Engine image ────────────────────────────────────────────────
  build-engine:
    name: Build Engine
    needs: detect-changes
    if: needs.detect-changes.outputs.engine == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: packages/mail-engine
          file: packages/mail-engine/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-engine:latest
            ${{ env.IMAGE_PREFIX }}-engine:${{ github.sha }}
          cache-from: type=gha,scope=engine
          cache-to: type=gha,mode=max,scope=engine

  # ── Build AI Worker image ──────────────────────────────────────────────────
  build-ai-worker:
    name: Build AI Worker
    needs: detect-changes
    if: needs.detect-changes.outputs.ai_worker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/ai-worker/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-ai-worker:latest
            ${{ env.IMAGE_PREFIX }}-ai-worker:${{ github.sha }}
          cache-from: type=gha,scope=ai-worker
          cache-to: type=gha,mode=max,scope=ai-worker

  # ── Deploy to server ───────────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: [detect-changes, build-api, build-web, build-docs, build-engine, build-ai-worker]
    # Run if nothing failed/cancelled AND at least one thing changed
    if: >-
      always() && !failure() && !cancelled() && (
        needs.detect-changes.outputs.api == 'true' ||
        needs.detect-changes.outputs.web == 'true' ||
        needs.detect-changes.outputs.docs == 'true' ||
        needs.detect-changes.outputs.engine == 'true' ||
        needs.detect-changes.outputs.ai_worker == 'true' ||
        needs.detect-changes.outputs.deploy == 'true'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_PROJECT_ID: wistfare-1756656058858
          MFA_SECRETS_KEY: ${{ secrets.MFA_SECRETS_KEY }}
          CHANGED_API:        ${{ needs.detect-changes.outputs.api }}
          CHANGED_WEB:        ${{ needs.detect-changes.outputs.web }}
          CHANGED_DOCS:       ${{ needs.detect-changes.outputs.docs }}
          CHANGED_ENGINE:     ${{ needs.detect-changes.outputs.engine }}
          CHANGED_AI_WORKER:  ${{ needs.detect-changes.outputs.ai_worker }}
          CHANGED_DEPLOY:     ${{ needs.detect-changes.outputs.deploy }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Map changed workflow outputs → docker compose service names
          SERVICES=""
          [ "$CHANGED_API"       = "true" ] && SERVICES="$SERVICES api"
          [ "$CHANGED_WEB"       = "true" ] && SERVICES="$SERVICES web"
          [ "$CHANGED_DOCS"      = "true" ] && SERVICES="$SERVICES docs"
          [ "$CHANGED_ENGINE"    = "true" ] && SERVICES="$SERVICES mail-engine"
          [ "$CHANGED_AI_WORKER" = "true" ] && SERVICES="$SERVICES ai-worker"
          SERVICES="${SERVICES# }"  # trim leading space

          # Always sync compose + Caddyfile
          scp -i ~/.ssh/deploy_key docker-compose.yml Caddyfile \
            root@"$DEPLOY_HOST":/opt/wistmail/

          # Sync Firebase service account JSON to server. Docker compose
          # bind-mounts /opt/wistmail/.secrets/firebase-service-account.json into
          # the api container, so the file must exist even if the secret hasn't
          # been set yet — we write an empty JSON placeholder in that case and
          # the FCM sender treats bad credentials as a silent no-op.
          ssh -i ~/.ssh/deploy_key root@"$DEPLOY_HOST" \
            "mkdir -p /opt/wistmail/.secrets && chmod 700 /opt/wistmail/.secrets"
          if [ -n "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "$FIREBASE_SERVICE_ACCOUNT_JSON" > /tmp/firebase-sa.json
          else
            echo '{}' > /tmp/firebase-sa.json
          fi
          scp -i ~/.ssh/deploy_key /tmp/firebase-sa.json \
            root@"$DEPLOY_HOST":/opt/wistmail/.secrets/firebase-service-account.json.new
          ssh -i ~/.ssh/deploy_key root@"$DEPLOY_HOST" "
            chmod 600 /opt/wistmail/.secrets/firebase-service-account.json.new
            mv /opt/wistmail/.secrets/firebase-service-account.json.new \
               /opt/wistmail/.secrets/firebase-service-account.json
          "
          rm -f /tmp/firebase-sa.json

          # Ensure MFA_SECRETS_KEY is in /opt/wistmail/.env. The api will
          # refuse to start without it (`?MFA_SECRETS_KEY is required` in
          # docker-compose.yml). Idempotent: only inserts the line if not
          # already present, never overwrites an existing key (rotating a
          # key would invalidate every stored TOTP secret — must be done
          # deliberately, not as a deploy side-effect).
          if [ -n "$MFA_SECRETS_KEY" ]; then
            ssh -i ~/.ssh/deploy_key root@"$DEPLOY_HOST" \
              "touch /opt/wistmail/.env && chmod 600 /opt/wistmail/.env && \
               grep -q '^MFA_SECRETS_KEY=' /opt/wistmail/.env || \
               echo 'MFA_SECRETS_KEY=$MFA_SECRETS_KEY' >> /opt/wistmail/.env"
          fi

          # Run DB migrations BEFORE restarting the api. The newly-
          # built image is pulled first so drizzle-kit sees the
          # latest checked-in migration files baked in at build time
          # (packages/db/drizzle). The migrate-runner is idempotent:
          # on a fresh DB it creates everything; on an existing DB
          # it bootstraps __drizzle_migrations with the current
          # snapshot and exits clean. Failure here aborts the
          # deploy — we do NOT want a half-migrated schema reachable
          # from a freshly-restarted api.
          if [ "$CHANGED_API" = "true" ]; then
            ssh -i ~/.ssh/deploy_key root@"$DEPLOY_HOST" "
              set -e
              cd /opt/wistmail
              docker compose pull api
              docker compose run --rm \
                -w /app/packages/db \
                --entrypoint '' \
                api \
                node --import tsx/esm src/migrate-runner.ts
            "
          fi

          # Deploy only what changed
          ssh -i ~/.ssh/deploy_key root@"$DEPLOY_HOST" "
            set -e
            cd /opt/wistmail

            if [ '$CHANGED_DEPLOY' = 'true' ]; then
              # Compose file changed — pull any rebuilt images then re-apply full stack
              [ -n '$SERVICES' ] && docker compose pull $SERVICES
              docker compose up -d --remove-orphans
            else
              # Only specific service images changed — targeted pull + restart
              for svc in $SERVICES; do
                docker compose pull \$svc
                docker compose up -d --no-deps \$svc
              done
            fi

            # Reload Caddy config (mounted file changes don't restart the container)
            docker exec wistmail-caddy-1 caddy reload --config /etc/caddy/Caddyfile 2>/dev/null || true

            docker image prune -f
          "
