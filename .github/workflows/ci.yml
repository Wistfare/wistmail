name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: https://mail.wistfare.com/api

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to server
        run: |
          # Sync everything including node_modules (pre-built from CI)
          # Exclude only git, env files, and mail-engine (Docker-built)
          rsync -azq \
            -e "ssh -i ~/.ssh/deploy_key" \
            --delete \
            --exclude .git \
            --exclude .env \
            --exclude .env.local \
            --exclude packages/mail-engine \
            --exclude packages/db/drizzle \
            ./ root@${{ secrets.DEPLOY_HOST }}:/opt/wistmail/

          # Only restart services — no installs, no builds on server
          ssh -i ~/.ssh/deploy_key root@${{ secrets.DEPLOY_HOST }} \
            'systemctl restart wistmail-api wistmail-web wistmail-docs'
