services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wistmail}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-wistmail}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wistmail}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Go Mail Engine (SMTP + IMAP + gRPC) ────────────────────────────────────
  mail-engine:
    image: ghcr.io/wistfare/wistmail-engine:latest
    restart: unless-stopped
    environment:
      MAIL_DOMAIN: ${MAIL_DOMAIN:?MAIL_DOMAIN is required}
      HOSTNAME: ${MAIL_HOSTNAME:-${MAIL_DOMAIN}}
      DATABASE_URL: postgresql://${POSTGRES_USER:-wistmail}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-wistmail}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-wistmail}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      S3_BUCKET: ${S3_BUCKET:-wistmail-attachments}
      S3_REGION: ${S3_REGION:-us-east-1}
      SMTP_PORT: "25"
      SMTP_SUBMISSION_PORT: "587"
      IMAP_PORT: "143"
      IMAP_SSL_PORT: "993"
      TLS_CERT_PATH: ${TLS_CERT_PATH:-}
      TLS_KEY_PATH: ${TLS_KEY_PATH:-}
      API_INTERNAL_URL: http://api:3001
      INBOUND_SECRET: ${INBOUND_SECRET:?INBOUND_SECRET is required}
    ports:
      - "25:25"
      - "587:587"
      - "143:143"
      - "993:993"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── MinIO (S3-compatible object storage) ────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-wistmail}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MeiliSearch ─────────────────────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:latest
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?MEILI_MASTER_KEY is required}
      MEILI_ENV: ${MEILI_ENV:-production}
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Caddy (reverse proxy + automatic HTTPS) ─────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:-mail.wistfare.com}
      DOCS_DOMAIN: ${DOCS_DOMAIN:-docs.mail.wistfare.com}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api
      - docs

  # ── API Gateway (Hono / Node.js) ───────────────────────────────────────────
  api:
    image: ghcr.io/wistfare/wistmail-api:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-wistmail}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-wistmail}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-wistmail}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET:-wistmail-attachments}
      S3_REGION: ${S3_REGION:-us-east-1}
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILI_MASTER_KEY}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      API_PORT: "3001"
      ALLOW_SKIP_DNS: ${ALLOW_SKIP_DNS:-false}
      INBOUND_SECRET: ${INBOUND_SECRET}
      MAIL_ENGINE_URL: http://mail-engine:8025
      # Firebase Admin SDK reads the service account from this path.
      # The file is written by the deploy workflow to ./.secrets/ on the host.
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/firebase-service-account.json
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-wistfare-1756656058858}
      # AES-256-GCM key for encrypting MFA secrets at rest. 32-byte hex
      # (64 chars). Generate once with `openssl rand -hex 32`. Rotating
      # this invalidates every stored TOTP secret — users must re-enroll.
      MFA_SECRETS_KEY: ${MFA_SECRETS_KEY:?MFA_SECRETS_KEY is required}
    volumes:
      - ./.secrets/firebase-service-account.json:/run/secrets/firebase-service-account.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy

  # ── Web Client (Next.js) ───────────────────────────────────────────────────
  web:
    image: ghcr.io/wistfare/wistmail-web:latest
    restart: unless-stopped
    environment:
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
    depends_on:
      - api

  # ── Docs (Next.js) ─────────────────────────────────────────────────────────
  docs:
    image: ghcr.io/wistfare/wistmail-docs:latest
    restart: unless-stopped
    environment:
      HOSTNAME: "0.0.0.0"
      PORT: "3002"

volumes:
  postgres_data:
  redis_data:
  minio_data:
  meilisearch_data:
  caddy_data:
  caddy_config:
