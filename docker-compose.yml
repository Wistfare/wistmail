services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: wistmail
      POSTGRES_PASSWORD: wistmail
      POSTGRES_DB: wistmail
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wistmail"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Go Mail Engine (SMTP + IMAP + gRPC) ────────────────────────────────────
  mail-engine:
    build:
      context: ./packages/mail-engine
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      MAIL_DOMAIN: ${MAIL_DOMAIN:-localhost}
      HOSTNAME: ${HOSTNAME:-localhost}
      DATABASE_URL: postgresql://wistmail:wistmail@postgres:5432/wistmail
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: wistmail
      S3_SECRET_KEY: wistmail-secret
      S3_BUCKET: wistmail-attachments
      S3_REGION: us-east-1
      SMTP_PORT: "25"
      SMTP_SUBMISSION_PORT: "587"
      IMAP_PORT: "143"
      IMAP_SSL_PORT: "993"
      GRPC_PORT: "50051"
      TLS_CERT_PATH: ${TLS_CERT_PATH:-}
      TLS_KEY_PATH: ${TLS_KEY_PATH:-}
    ports:
      - "25:25"         # SMTP inbound
      - "587:587"       # SMTP submission
      - "143:143"       # IMAP
      - "993:993"       # IMAPS
      - "50051:50051"   # gRPC (internal API)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "true"]  # Basic check — engine logs to stdout
      interval: 30s
      timeout: 5s
      retries: 3

  # ── MinIO (S3-compatible object storage) ────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: wistmail
      MINIO_ROOT_PASSWORD: wistmail-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── MeiliSearch ─────────────────────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:latest
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: wistmail-search-key
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  minio_data:
  meilisearch_data:
