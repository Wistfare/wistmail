services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: wistmail
      POSTGRES_PASSWORD: wistmail
      POSTGRES_DB: wistmail
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wistmail"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Go Mail Engine (SMTP + IMAP + gRPC) ────────────────────────────────────
  mail-engine:
    image: ghcr.io/wistfare/wistmail-engine:latest
    restart: unless-stopped
    environment:
      MAIL_DOMAIN: ${MAIL_DOMAIN:-localhost}
      HOSTNAME: ${MAIL_HOSTNAME:-localhost}
      DATABASE_URL: postgresql://wistmail:wistmail@postgres:5432/wistmail
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: wistmail
      S3_SECRET_KEY: wistmail-secret
      S3_BUCKET: wistmail-attachments
      S3_REGION: us-east-1
      SMTP_PORT: "25"
      SMTP_SUBMISSION_PORT: "587"
      IMAP_PORT: "143"
      IMAP_SSL_PORT: "993"
      GRPC_PORT: "50051"
      TLS_CERT_PATH: ${TLS_CERT_PATH:-}
      TLS_KEY_PATH: ${TLS_KEY_PATH:-}
      API_INTERNAL_URL: http://api:3001
      INBOUND_SECRET: ${INBOUND_SECRET:-wistfare-inbound-secret-2026}
    ports:
      - "25:25"
      - "587:587"
      - "143:143"
      - "993:993"
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── MinIO (S3-compatible object storage) ────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: wistmail
      MINIO_ROOT_PASSWORD: wistmail-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── MeiliSearch ─────────────────────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:latest
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: wistmail-search-key
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── API Gateway (Hono / Node.js) ───────────────────────────────────────────
  api:
    image: ghcr.io/wistfare/wistmail-api:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://wistmail:wistmail@postgres:5432/wistmail
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: wistmail
      S3_SECRET_KEY: wistmail-secret
      S3_BUCKET: wistmail-attachments
      S3_REGION: us-east-1
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_API_KEY: wistmail-search-key
      JWT_SECRET: ${JWT_SECRET:-wistmail-jwt-secret}
      API_PORT: "3001"
      ALLOW_SKIP_DNS: ${ALLOW_SKIP_DNS:-false}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      INBOUND_SECRET: ${INBOUND_SECRET:-wistfare-inbound-secret-2026}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy

  # ── Web Client (Next.js) ───────────────────────────────────────────────────
  web:
    image: ghcr.io/wistfare/wistmail-web:latest
    restart: unless-stopped
    environment:
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      - api

  # ── Docs (Next.js) ─────────────────────────────────────────────────────────
  docs:
    image: ghcr.io/wistfare/wistmail-docs:latest
    restart: unless-stopped
    environment:
      HOSTNAME: "0.0.0.0"
      PORT: "3002"
    ports:
      - "3002:3002"

volumes:
  postgres_data:
  redis_data:
  minio_data:
  meilisearch_data:
